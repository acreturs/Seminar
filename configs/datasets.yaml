datasets:
  dl3dv140:
    role: main_sparse_view_eval
    used_by_flowr: 12-view and 24-view sparse input settings at 540x960.
    source: https://huggingface.co/datasets/DL3DV/DL3DV-Benchmark
    access: Hugging Face login and dataset access approval may be required.
    size_notes:
      full_benchmark: about 2.1 TB
      benchmark_960p: about 100-150 GB
    local_raw: data/raw/dl3dv
    local_processed_12v: data/processed/flowr/dl3dv140-12v
    local_processed_24v: data/processed/flowr/dl3dv140-24v
  dl3dv10k:
    role: flowr_training_source
    used_by_flowr: Training source for rendered/ground-truth pairs with 6-36 sparse input views.
    source: https://github.com/DL3DV-10K/Dataset
    access: Hugging Face login and access approval may be required.
    size_notes:
      images_480p: about 730 GB
      images_960p: about 2.8 TB
      videos_4k: about 7 TB
  scannetpp:
    role: dense_view_eval_and_training_source
    used_by_flowr: Official nvs_sem_val split for dense-view evaluation; nvs_sem_train for training.
    source: https://scannetpp.mlsg.cit.tum.de/scannetpp/documentation
    access: Registration/login required at the official ScanNet++ site.
    size_notes:
      dslr_2mp_only: about 371 GB
      default_download: about 1.5 TB
    local_raw: data/raw/scannetpp
    local_processed_val: data/processed/flowr/scannetpp-val
  nerfbusters:
    role: dense_view_eval
    used_by_flowr: Original Nerfbusters evaluation protocol with disjoint train/test trajectories.
    source: https://github.com/ethanweber/nerfbusters
    access: Data is linked from the project README via Google Drive.
    local_raw: data/raw/nerfbusters
  mipnerf360:
    role: appendix_few_view_eval
    used_by_flowr: 3, 6, and 9 view appendix comparison following ReconFusion.
    source: https://jonbarron.info/mipnerf360/
    access: Public download links, but still large enough to keep outside git.
    local_raw: data/raw/mipnerf360
